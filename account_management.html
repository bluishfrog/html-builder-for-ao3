<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Management</title>

    <link rel="stylesheet" href="css/site_style.css">
</head>

<body>

    <div class="page-wrapper">

        <!-- NAV -->
        <div id="nav-placeholder"></div>

        <main class="main-content">

            <h1>Account Management</h1>
            <p>
                Add, edit, and organize your social media accounts here.
                These accounts will later be used in your posts and documents.
            </p>

            <!-- ================= TWITTER ================= -->
            <div class="card-section" id="twitterSection">
                <h2>Twitter Accounts</h2>

                <!-- File status -->
                <p id="twitterFileStatus" class="file-status">
                    No file selected
                </p>

                <!-- Account list -->
                <div id="twitterList" class="account-list"></div>

                <!-- Add button -->
                <button id="addTwitterBtn" onclick="openTwitterForm()" disabled>
                    + Add Account
                </button>
            </div>

            <!-- ================= TUMBLR ================= -->
            <div class="card-section" id="tumblrSection">
                <h2>Tumblr Accounts</h2>

                <!-- File status -->
                <p id="tumblrFileStatus" class="file-status">
                    No file selected
                </p>

                <!-- Account list -->
                <div id="tumblrList" class="account-list"></div>

                <!-- Add button -->
                <button id="addTumblrBtn" onclick="openTumblrForm()" disabled>
                    + Add Account
                </button>
            </div>

        </main>

        <!-- FOOTER -->
        <div id="footer-placeholder"></div>

    </div>

    <script src="js/loadComponents.js"></script>
    <script src="js/account_database.js"></script>
    <script src="js/account_management.js"></script>

</body>

</html>
