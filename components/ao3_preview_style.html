<style>
/* Basic AO3 content container */
body {
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 14px;
    line-height: 1.6;
    color: #333;
    background: #fff;
    margin: 0;
    padding: 0;
}

#work {
    max-width: 760px; /* AO3 default content width */
    margin: 2em auto;
    padding: 0 1em;
}

/* Headings like AO3 */
h2, h3 {
    font-family: "Georgia", "Times New Roman", serif;
    font-weight: normal;
    margin: 1em 0 0.5em;
}

h2 {
    font-size: 1.5em;
}

h3 {
    font-size: 1.2em;
}

/* Paragraphs */
p {
    margin: 0 0 1em;
}

/* Links */
a {
    color: #0645ad;
    text-decoration: underline;
}

a:hover {
    text-decoration: none;
}

/* Blockquotes and quotes */
blockquote {
    border-left: 3px solid #ccc;
    margin: 1em 0;
    padding-left: 1em;
    color: #555;
    font-style: italic;
}

/* Footnotes / endnotes */
.notes {
    font-size: 0.9em;
    margin-top: 2em;
    border-top: 1px solid #ccc;
    padding-top: 1em;
}

/* Lists */
ul, ol {
    margin: 0 0 1em 2em;
}

/* Images inside content */
#work img {
    max-width: 100%;
    height: auto;
}

/* Ensure workskin CSS can override */
@layer workskin {}
</style>
