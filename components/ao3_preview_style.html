<style>
/* AO3-like body and content */
body {
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 14px;
    line-height: 1.7; /* slightly taller for AO3 readability */
    color: #333;
    background: #fff;
    margin: 0;
    padding: 0;
}

#work {
    max-width: 760px;
    margin: 2em auto;
    padding: 0 1em;
}

/* Headings */
h2, h3 {
    font-family: "Georgia", "Times New Roman", serif;
    font-weight: normal;
    margin-top: 2em; /* more space before headers */
    margin-bottom: 0.5em; /* smaller space after headers */
}

h2 {
    font-size: 1.5em;
}

h3 {
    font-size: 1.2em;
}

/* Paragraphs */
p {
    margin-top: 0;
    margin-bottom: 1em; /* AO3 has slightly larger spacing between paragraphs */
}

/* Links */
a {
    color: #0645ad;
    text-decoration: underline;
}

a:hover {
    text-decoration: none;
}

/* Blockquotes */
blockquote {
    border-left: 3px solid #ccc;
    margin: 1.2em 0; /* a bit more spacing above and below */
    padding-left: 1em;
    color: #555;
    font-style: italic;
}

/* Notes / footnotes */
.notes {
    font-size: 0.85em;
    margin-top: 2em;
    border-top: 1px solid #ccc;
    padding-top: 1em;
}

/* Lists */
ul, ol {
    margin: 0 0 1em 2em;
}

/* Images */
#work img {
    max-width: 100%;
    height: auto;
    margin: 1em 0; /* spacing around images like AO3 */
}

/* Horizontal rules */
hr {
    border: none;
    border-top: 1px solid #ccc;
    margin: 2em 0;
}

/* Allow workskin CSS to override */
@layer workskin {}
</style>
