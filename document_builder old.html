<!DOCTYPE html>
<html lang="en">

<head>
    <div id="head-placeholder"></div>
    <script src="js/loadComponents.js"></script>
</head>

<body>

    <!-- Navigation -->
    <div id="nav-placeholder"></div>

    <!-- Main container -->
    <div class="main-container">

        <!-- LEFT: EDITOR -->
        <div class="panel builder-panel">
            <h2>Builder</h2>

            <h3>Create New Post</h3>
            <div class="posttype_selection">
                <div id="twitterpost"></div>
                <button onclick="addTwitterPost()">+ Add Twitter Post</button>
                <div id="tumblrpost"></div>
                <button onclick="addTumblrPost()">+ Add Tumblr Post</button>
            </div>


            <!-- Account selection -->
            <h3>Select Account</h3>
            <select id="accountSelect">
                <option value="">-- Choose Account --</option>
            </select>

            <!-- Main Tweet -->
            <h3>Main Tweet</h3>
            <input id="name" placeholder="Name">
            <input id="handle" placeholder="@handle">
            <input id="icon" placeholder="Icon URL">
            <textarea id="content" placeholder="Tweet content"></textarea>
            <input id="hashtags" placeholder="#tags separated by space">
            <input id="timestamp" placeholder="Timestamp">

            <!-- Stats -->
            <h3>Stats</h3>
            <div class="stats-row">
                <div>
                    <label>Retweets</label>
                    <input id="retweets" placeholder=56 type="number">
                </div>
                <div>
                    <label>Quotes</label>
                    <input id="quotes" placeholder=11 type="number">
                </div>
                <div>
                    <label>Likes</label>
                    <input id="likes" placeholder=271 type="number">
                </div>
            </div>

            <!-- Replies -->
            <h3>Replies</h3>
            <div id="replies"></div>
            <button onclick="addReply()">+ Add Reply</button>

            <br>
            <button onclick="copyHTML()">Copy HTML</button>
            <textarea id="output" rows="10" placeholder="Generated HTML"></textarea>
        </div>

        <!-- RIGHT: AO3 PREVIEW -->
        <div class="panel preview-panel">
            <div id="workskin">
                <div id="preview"></div>
            </div>
        </div>

    </div>

    <div id="footer-placeholder"></div>

    <script src="js/loadComponents.js"></script>

    <!-- Scripts -->
    <script src="js/test_accounts.js"></script>
    <script src="js/builder.js"></script>
    <script>
        // Populate the account dropdown from test_accounts.js
        const accountSelect = document.getElementById('accountSelect');

        testAccounts.forEach(acc => {
            const option = document.createElement('option');
            option.value = acc.id;
            option.textContent = acc.name + " (" + acc.handle + ")";
            accountSelect.appendChild(option);
        });

        accountSelect.addEventListener('change', () => {
            const selected = testAccounts.find(a => a.id === accountSelect.value);
            if (selected) {
                document.getElementById('name').value = selected.name;
                document.getElementById('handle').value = selected.handle;
                document.getElementById('icon').value = selected.icon;
                // Disable fields if desired
                document.getElementById('name').disabled = true;
                document.getElementById('handle').disabled = true;
                document.getElementById('icon').disabled = true;
            } else {
                document.getElementById('name').value = '';
                document.getElementById('handle').value = '';
                document.getElementById('icon').value = '';
                document.getElementById('name').disabled = false;
                document.getElementById('handle').disabled = false;
                document.getElementById('icon').disabled = false;
            }
            update(); // refresh preview
        });
    </script>


</body>

</html>
