<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Builder</title>

    <!-- Site-wide CSS -->
    <link rel="stylesheet" href="css/site_style.css">

    <!-- Editor styling -->
    <link rel="stylesheet" href="css/editor_style.css">

    <!-- AO3 preview CSS -->
    <link rel="stylesheet" href="css/skin_2025_SocialMediaFormatting.css">
</head>

<body>

    <!-- Navigation -->
    <nav style="margin-bottom: 20px;">
        <a href="index.html">Home</a> |
        <a href="document_builder.html">Document Builder</a> |
        <a href="account_database.html">Account Database</a>
    </nav>

    <!-- Main container -->
    <div style="display: flex; gap: 20px; align-items: flex-start;">

        <!-- LEFT: EDITOR -->
        <div class="panel" style="flex:1;">
            <h2>Editor</h2>

            <h3>Select Account</h3>
            <select id="accountSelect">
                <option value="">-- Choose Account --</option>
            </select>

            <h3>Main Tweet</h3>
            <input id="name" placeholder="Name">
            <input id="handle" placeholder="@handle">
            <input id="icon" placeholder="Icon URL">
            <textarea id="content" placeholder="Tweet content"></textarea>
            <input id="hashtags" placeholder="#tags separated by space">
            <input id="timestamp" placeholder="Timestamp">

            <h3>Stats</h3>
            <div class="stats-row">
                <div>
                    <label>Retweets</label>
                    <input id="retweets" type="number">
                </div>
                <div>
                    <label>Quotes</label>
                    <input id="quotes" type="number">
                </div>
                <div>
                    <label>Likes</label>
                    <input id="likes" type="number">
                </div>
            </div>

            <h3>Replies</h3>
            <div id="replies"></div>
            <button onclick="addReply()">+ Add Reply</button>

            <br>
            <button onclick="copyHTML()">Copy HTML</button>
            <textarea id="output" rows="10" placeholder="Generated HTML"></textarea>
        </div>

        <!-- RIGHT: AO3 PREVIEW -->
        <div class="panel preview" style="flex:1; display:block;">
            <div id="workskin">
                <div id="preview"></div>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script>
        let replies = [];

        function addReply() {
            const id = Date.now();
            replies.push({ id, name: '', handle: '', icon: '', content: '' });
            renderReplies();
        }

        function renderReplies() {
            const container = document.getElementById('replies');
            container.innerHTML = '';

            replies.forEach(r => {
                const div = document.createElement('div');
                div.className = 'reply';
                div.innerHTML = `
      <input placeholder="Name" oninput="updateReply(${r.id}, 'name', this.value)">
      <input placeholder="Handle" oninput="updateReply(${r.id}, 'handle', this.value)">
      <input placeholder="Icon URL" oninput="updateReply(${r.id}, 'icon', this.value)">
      <textarea placeholder="Reply" oninput="updateReply(${r.id}, 'content', this.value)"></textarea>
      <button onclick="deleteReply(${r.id})">Delete</button>
    `;
                container.appendChild(div);
            });
        }

        function updateReply(id, field, value) {
            const r = replies.find(x => x.id === id);
            r[field] = value;
            update();
        }

        function deleteReply(id) {
            replies = replies.filter(r => r.id !== id);
            renderReplies();
            update();
        }

        function formatHashtags(text) {
            if (!text) return '';
            return text.split(' ').map(tag => `<span class="twt-hl">${tag}</span>`).join(' ');
        }

        function generateHTML() {
            const name = document.getElementById('name').value;
            const handle = document.getElementById('handle').value;
            const icon = document.getElementById('icon').value;
            const content = document.getElementById('content').value;
            const hashtags = formatHashtags(document.getElementById('hashtags').value);
            const timestamp = document.getElementById('timestamp').value;
            const retweets = document.getElementById('retweets').value || 0;
            const quotes = document.getElementById('quotes').value || 0;
            const likes = document.getElementById('likes').value || 0;

            let html = `<div class="twt">
<div class="twt-header">
  <div class="twt-icon-container">
    <p><img class="twt-icon" src="${icon}"></p>
  </div>
  <div class="twt-id">
    <p><span class="twt-name">${name}</span><br>
    <span class="twt-handle">${handle}</span></p>
  </div>
</div>

<div class="twt-content">
  <p>${content}</p>
</div>

<p>${hashtags}</p>

<div class="twt-timestamp">
  <p>${timestamp}</p>
</div>

<hr class="twt-sep">

<div class="twt-stat1">
  <p><strong>${retweets}</strong> Retweets <strong>${quotes}</strong> Quote Tweets <strong>${likes}</strong> Likes</p>
</div>`;

            replies.forEach(r => {
                html += `
<hr class="twt-sep-reply">
<div class="twt-replybox">
  <div class="twt-icon-replycontainer">
    <p><img class="twt-icon" src="${r.icon}"></p>
  </div>
  <div class="twt-replycontainer">
    <p><span class="twt-name">${r.name}</span> <span class="twt-handle">${r.handle}</span></p>
    <div class="twt-replycontent">
      <p>${r.content}</p>
    </div>
  </div>
</div>`;
            });

            html += `</div>`;
            return html;
        }

        function update() {
            const html = generateHTML();
            document.getElementById('output').value = html;
            document.getElementById('preview').innerHTML = html;
        }

        function copyHTML() {
            const textarea = document.getElementById('output');
            textarea.select();
            document.execCommand('copy');
        }

        // Attach input listeners
        ['name', 'handle', 'icon', 'content', 'hashtags', 'timestamp', 'retweets', 'quotes', 'likes']
            .forEach(id => document.getElementById(id).addEventListener('input', update));

    </script>

</body>

</html>
