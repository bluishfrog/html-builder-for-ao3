<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Preview</title>
  <link rel="stylesheet" href="css/workskin_orig.css">

  <link rel="stylesheet" href="css/workskin_orig.css">

  <style>
    /* Normalize spacing for injected AO3 content */
    #workskin .twt,
    #workskin .twt-replybox,
    #workskin .twt-quotebox {
      overflow: hidden;
      /* contain floats */
    }

    #workskin .twt+.twt,
    #workskin .twt-replybox+.twt-replybox {
      margin-top: 1em;
      /* consistent spacing between tweets/replies */
    }

    #workskin .twt-content,
    #workskin .twt-replycontent,
    #workskin .t_line,
    #workskin .t_ask,
    #workskin .reblogtext {
      margin-top: 0.3em;
      margin-bottom: 0.3em;
      /* normalize spacing */
    }

    #workskin .twt-timestamp,
    #workskin .twt-stat1,
    #workskin .twt-stat2 {
      display: block;
      line-height: 1.2em;
      /* tighten vertical spacing */
    }
  </style>
</head>

<body>
  <div id="preview-root"></div>

  <script>
    fetch('test_data/TestProject/output.html')
      .then(response => response.text())
      .then(html => {
        // Wrap the Ao3 content inside a div with id "workskin"
        document.getElementById('preview-root').innerHTML = `<div id="workskin">${html}</div>`;
      })
      .catch(err => {
        document.getElementById('preview-root').innerHTML = '<p style="color:red;">Failed to load preview</p>';
        console.error(err);
      });
  </script>
</body>

</html>
