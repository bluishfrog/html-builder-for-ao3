<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Preview</title>

  <!-- AO3 base CSS first -->
  <link rel="stylesheet" href="css/ao3/1_site_screen_.css">
  <link rel="stylesheet" href="css/ao3/4_site_midsize.handheld_.css" media="only screen and (max-width: 62em)">
  <link rel="stylesheet" href="css/ao3/5_site_narrow.handheld_.css" media="only screen and (max-width: 42em)">
  <link rel="stylesheet" href="css/ao3/6_site_speech_.css" media="speech">
  <link rel="stylesheet" href="css/ao3/7_site_print_.css" media="print">

  <!-- Workskin loaded AFTER AO3 base -->
  <link rel="stylesheet" href="css/workskin_orig.css">
</head>

<body>
  <script>
    const previewPath = 'test_data/TestProject/output.html';

    fetch(previewPath)
      .then(response => {
        if (!response.ok) throw new Error('Failed to load preview HTML');
        return response.text();
      })
      .then(html => {
        // Parse the fetched HTML
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        // Get the body content or fallback to all content
        const bodyContent = doc.body && doc.body.innerHTML.trim() !== ''
          ? doc.body.innerHTML
          : doc.documentElement.innerHTML;

        // Clear existing body content
        document.body.innerHTML = '';

        // Create a temporary container to hold the fetched HTML
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = bodyContent;

        // Move all children to the real body
        while (tempDiv.firstChild) {
          document.body.appendChild(tempDiv.firstChild);
        }
      })
      .catch(err => {
        console.error('Error loading preview:', err);
        document.body.innerHTML = '<p style="color:red;">Failed to load preview.</p>';
      });
  </script>
</body>

</html>
