<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Preview</title>

  <!-- AO3 base CSS first -->
  <link rel="stylesheet" href="ao3/1_site_screen_.css">
  <link rel="stylesheet" href="ao3/4_site_midsize.handheld_.css" media="only screen and (max-width: 62em)">
  <link rel="stylesheet" href="ao3/5_site_narrow.handheld_.css" media="only screen and (max-width: 42em)">
  <link rel="stylesheet" href="ao3/6_site_speech_.css" media="speech">
  <link rel="stylesheet" href="ao3/7_site_print_.css" media="print">

  <!-- Workskin loaded AFTER AO3 base -->
  <link rel="stylesheet" href="css/workskin_orig.css">
</head>

<body>
  <div id="preview-root"></div>

  <script>
    fetch('test_data/TestProject/output.html')
      .then(response => response.text())
      .then(html => {
        // Wrap the content in #work so AO3 CSS applies
        document.getElementById('preview-root').innerHTML = `<div id="work">${html}</div>`;
      })
      .catch(err => {
        document.getElementById('preview-root').innerHTML = '<p style="color:red;">Failed to load preview</p>';
        console.error(err);
      });
  </script>
</body>

</html>
