<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Preview</title>
  <link rel="stylesheet" href="css/worksin_2026_blusHTMLBuilder.css">
  
  <style>
    /* Reset body/html to avoid extra spacing interfering with workskin */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      overflow-x: hidden;
    }
  </style>
</head>

<body>

  <script>
    // Fetch output.html and inject it directly into the body
    fetch('test_data/TestProject/output.html')
      .then(response => response.text())
      .then(html => {
        // Clear body and inject HTML directly
        document.body.innerHTML = html;
      })
      .catch(err => {
        document.body.innerHTML = '<p style="color:red;">Failed to load preview</p>';
        console.error(err);
      });
  </script>

</body>

</html>
