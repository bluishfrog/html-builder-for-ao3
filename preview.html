<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Preview</title>
  <link rel="stylesheet" href="css/worksin_2026_blusHTMLBuilder.css">
  
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      overflow-x: hidden;
    }

    /* Wrapper to contain floats and negative margins */
    #preview-root {
      width: 100%;
      max-width: 100%;
      display: block;
      overflow: auto; /* contain floats */
      padding: 0;
      margin: 0;
    }
  </style>
</head>

<body>
  <div id="preview-root"></div>

  <script>
    fetch('test_data/TestProject/output.html')
      .then(response => response.text())
      .then(html => {
        // Wrap the Ao3 content inside a div with id "workskin"
        document.getElementById('preview-root').innerHTML = `<div id="workskin">${html}</div>`;
      })
      .catch(err => {
        document.getElementById('preview-root').innerHTML = '<p style="color:red;">Failed to load preview</p>';
        console.error(err);
      });
  </script>
</body>

</html>
