<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Preview</title>
  <link rel="stylesheet" href="css/worksin_2026_blusHTMLBuilder.css">
</head>

<body>
  <div id="preview-root"></div>

  <script>
    // Fetch the output.html content and inject it inside a #workskin wrapper
    fetch('test_data/TestProject/output.html')
      .then(response => response.text())
      .then(html => {
        // Wrap the content in a div with id="workskin"
        const wrappedHTML = `<div id="workskin">${html}</div>`;
        document.getElementById('preview-root').innerHTML = wrappedHTML;
      })
      .catch(err => {
        document.getElementById('preview-root').innerHTML = '<p style="color:red;">Failed to load preview</p>';
        console.error(err);
      });
  </script>
</body>

</html>
